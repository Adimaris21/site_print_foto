<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestiune Print Foto Târgu Mureș</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-b9KS5OZ4ckOSEfAyLFm9QQuZqM9teO4",
            authDomain: "print-foto-7409e.firebaseapp.com",
            projectId: "print-foto-7409e",
            storageBucket: "print-foto-7409e.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>

    <style>
        :root {
            --bg: #f0f4f8;
            --sidebar: #0c1f2b;
            --primary: #00b4d8;
            --white: #ffffff;
            --text: #33475b;
            --success: #20bf6b;
            --warning: #f7b731;
            --danger: #ff5252;
            --info: #2fb7ff;
            --accent: #4b7bec;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { background: var(--bg); display: flex; min-height: 100vh; color: var(--text); }

        /* Sidebar Style */
        .sidebar { width: 280px; background: var(--sidebar); color: white; padding: 30px 20px; position: fixed; height: 100vh; }
        .sidebar h2 { font-size: 20px; font-weight: 800; margin-bottom: 40px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(0, 180, 216, 0.3); }

        /* Main Content Area */
        .main-content { margin-left: 280px; width: calc(100% - 280px); padding: 40px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        header h1 { font-size: 28px; font-weight: 800; }

        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border-top: 4px solid var(--primary); transition: 0.3s; }
        .stat-card:nth-child(2) { border-top-color: var(--info); }
        .stat-card:nth-child(3) { border-top-color: var(--warning); }
        .stat-card:nth-child(4) { border-top-color: var(--success); }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.08); }
        .stat-card small { color: #8898aa; font-weight: 700; font-size: 11px; text-transform: uppercase; }
        .stat-card h3 { font-size: 24px; margin-top: 5px; }

        /* Orders Table / List */
        .order-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eef2f6; transition: 0.3s; position: relative; overflow: hidden; }
        .order-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .order-card.status-primită { border-left: 6px solid var(--info); }
        .order-card.status-acceptată { border-left: 6px solid var(--primary); } /* Culoare nouă pentru Acceptată */
        .order-card.status-în-așteptare { border-left: 6px solid var(--warning); } /* Nou status */
        .order-card.status-în-lucru { border-left: 6px solid var(--accent); }
        .order-card.status-finalizată { border-left: 6px solid var(--success); }

        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .client-info h4 { font-size: 18px; margin-bottom: 5px; }
        .badge { padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .badge-primită { background: #e3f2fd; color: #1976d2; }
        .badge-acceptată { background: #e0f7fa; color: #00838f; } /* Badge color pentru Acceptată */
        .badge-în-așteptare { background: #fff3e0; color: #ef6c00; } /* Badge color pentru În Așteptare */
        .badge-în-lucru { background: #ede7f6; color: #673ab7; }
        .badge-finalizată { background: #e8f5e9; color: #2e7d32; }

        .order-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 15px 0; border-top: 1px solid #f4f7f9; border-bottom: 1px solid #f4f7f9; }
        .detail-item small { display: block; color: #8898aa; font-size: 11px; margin-bottom: 3px; }
        .detail-item p { font-weight: 700; font-size: 14px; }

        .actions { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-view { background: var(--sidebar); color: white; text-decoration: none; }
        .btn-accept { background: var(--warning); color: #000; }
        .btn-done { background: var(--success); color: white; }
        .btn-delete { background: #fff; color: var(--danger); border: 1px solid var(--danger); margin-left: auto; }
        .btn:hover { opacity: 0.8; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(0.8); }

        .notes { margin-top: 15px; background: #fdfdfd; padding: 12px; border-radius: 10px; border: 1px dashed #e1e8ed; font-size: 13px; font-style: italic; color: #5e6d82; }

        /* Rapoarte & Setări Styles */
        .reports-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .report-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .report-card i { font-size: 30px; color: var(--primary); margin-bottom: 15px; display: block; }
        .settings-container { background: white; padding: 30px; border-radius: 20px; max-width: 600px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* Notification Dot */
        .new-order-pulse { width: 10px; height: 10px; background: var(--danger); border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 82, 82, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); } }

        @media (max-width: 900px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .sidebar h2 span, .nav-item span { display: none; }
            .main-content { margin-left: 80px; width: calc(100% - 80px); padding: 15px; }
            .stats-bar { grid-template-columns: 1fr 1fr; }
            header h1 { font-size: 20px; }
            .order-details { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2><i class="fa-solid fa-camera-retro"></i> <span>ADMIN PRINT</span></h2>
        <div class="nav-item active" onclick="switchTab('new', this)">
            <i class="fa-solid fa-list-check"></i> <span>Comenzi Noi</span>
        </div>
        <div class="nav-item" onclick="switchTab('archive', this)">
            <i class="fa-solid fa-box-archive"></i> <span>Arhivă</span>
        </div>
        <div class="nav-item" onclick="switchTab('reports', this)"><i class="fa-solid fa-chart-line"></i> <span>Rapoarte</span></div>
        <div class="nav-item" onclick="switchTab('settings', this)"><i class="fa-solid fa-gear"></i> <span>Setări Preț</span></div>
    </div>

    <div class="main-content">
        <header>
            <h1>Gestionare Comenzi <span id="live-indicator"><div class="new-order-pulse"></div></span></h1>
            <p id="current-date" style="color: #8898aa; font-weight: 600;"></p>
        </header>

        <div class="stats-bar">
            <div class="stat-card">
                <small>Total Comenzi</small>
                <h3 id="stat-total">0</h3>
            </div>
            <div class="stat-card">
                <small>În așteptare</small>
                <h3 id="stat-pending" style="color: var(--info);">0</h3>
            </div>
            <div class="stat-card">
                <small>Acceptate</small>
                <h3 id="stat-accepted" style="color: var(--warning);">0</h3>
            </div>
            <div class="stat-card">
                <small>În Așteptare</small>
                <h3 id="stat-on-hold" style="color: var(--warning);">0</h3>
            </div>
            <div class="stat-card">
                <small>Finalizate</small>
                <h3 id="stat-done" style="color: var(--success);">0</h3>
            </div>
        </div>

        <div id="orders-list">
            <p style="text-align: center; padding: 50px; opacity: 0.5;">Se încarcă comenzile de pe server...</p>
        </div>
    </div>

    <script>
        // Data curentă în Header
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('ro-RO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        let currentTab = 'new';
        
        // Securitate de bază: Verificare parolă la intrare
        const accessKey = prompt("Introdu cheia de acces pentru administrare:");
        if (accessKey !== "ADMIN123") { // Schimbă "ADMIN123" cu o parolă dorită de tine
            document.body.innerHTML = "<h1 style='padding:50px; text-align:center;'>Acces Respins.</h1>";
        }

        let lastSnapshot = null;
        let currentPrices = { p10: 0.9, old_p10: 1.2, p13: 1.5, old_p13: 2.0, pA4: 3.0, old_pA4: 4.0, promoDate: "" };

        // Ascultă modificările de preț în timp real
        db.collection("settings").doc("prices").onSnapshot((doc) => {
            if (doc.exists) {
                currentPrices = doc.data();
                // Re-randăm doar dacă suntem activi pe tab-ul de setări
                if (currentTab === 'settings') {
                    renderSettingsUI();
                }
            }
        });

        /**
         * Schimbare Tab-uri Sidebar
         */
        function switchTab(tab, element) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            if (tab === 'settings') {
                renderSettingsUI();
            } else if (lastSnapshot) {
                renderOrders(lastSnapshot);
            }
        }

        /**
         * FETCH COMENZI DIN FIRESTORE (LIVE)
         */
        db.collection("comenzi").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            lastSnapshot = snapshot;
            renderOrders(snapshot);
        });

        function renderOrders(snapshot) {
            const listContainer = document.getElementById('orders-list');
            const headerTitle = document.querySelector('header h1');
            listContainer.innerHTML = "";

            let total = 0, pending = 0, active = 0, done = 0;
            let onHold = 0, count10 = 0, count13 = 0, countA4 = 0;

            if (snapshot.empty) {
                listContainer.innerHTML = '<div style="text-align:center; padding:100px; color:#8898aa;"><h3>☕ Nicio comandă primită încă.</h3></div>';
                return;
            }

            // Calcul Statistici (pe toate datele, indiferent de tab-ul selectat)
            snapshot.forEach(doc => {
                const data = doc.data();
                total++;
                if(data.status === "primită") pending++;
                if(data.status === "în așteptare") onHold++;
                if(data.status === "acceptată" || data.status === "în lucru") active++;
                if(data.status === "finalizată") done++;
                
                if(data.details) {
                    count10 += (data.details.n10 || 0);
                    count13 += (data.details.n13 || 0);
                    countA4 += (data.details.nA4 || 0);
                }
            });

            // Actualizare cifre în Stats
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-pending').innerText = pending;
            document.getElementById('stat-accepted').innerText = active;
            document.getElementById('stat-on-hold').innerText = onHold;
            document.getElementById('stat-done').innerText = done;

            // Randare conținut în funcție de Tab
            const titles = {
                'new': 'Gestionare Comenzi Noi',
                'archive': 'Arhivă Comenzi',
                'reports': 'Rapoarte Activitate',
                'settings': 'Setări Prețuri'
            };
            headerTitle.firstChild.textContent = titles[currentTab] + ' ';

            if(currentTab === 'reports') {
                renderReportsUI(count10, count13, countA4);
                return;
            }

            if(currentTab === 'settings') {
                // Nu facem nimic aici pentru a nu suprascrie input-urile în timp ce utilizatorul scrie
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;

                // Logica pentru activarea butoanelor în funcție de status
                const isPrimit = data.status === 'primită';
                const isAcceptat = data.status === 'acceptată';
                const isInLucru = data.status === 'în lucru';
                const isInAsteptare = data.status === 'în așteptare';

                // Filtrare pentru vizualizarea curentă
                if (currentTab === 'new' && (data.status === 'finalizată')) return;
                if (currentTab === 'archive' && data.status !== 'finalizată') return;

                // Generare HTML Card
                const card = document.createElement('div');
                card.className = `order-card status-${data.status}`;
                
                const date = data.timestamp ? data.timestamp.toDate().toLocaleString('ro-RO') : "Recentă";

                card.innerHTML = `
                    <div class="order-header">
                        <div class="client-info">
                            <h4>${data.name}</h4>
                            <p style="color:var(--info); font-weight:700;"><i class="fa-solid fa-phone"></i> ${data.phone}</p>
                        </div>
                        <div class="badge badge-${data.status}">${data.status.toUpperCase()}</div>
                    </div>

                    <div class="order-details">
                        <div class="detail-item">
                            <small>ID COMANDĂ</small>
                            <p>#${id.substring(id.length - 6)}</p>
                        </div>
                        <div class="detail-item">
                            <small>DATA ȘI ORA</small>
                            <p>${date}</p>
                        </div>
                        <div class="detail-item">
                            <small>CANTITATE POZE</small>
                            <p>10x15: ${data.details.n10} | 13x18: ${data.details.n13} | A4: ${data.details.nA4}</p>
                        </div>
                        <div class="detail-item">
                            <small>TOTAL DE PLATĂ</small>
                            <p style="color:var(--success); font-size: 16px;">${(data.details.n10 * currentPrices.p10 + data.details.n13 * currentPrices.p13 + data.details.nA4 * currentPrices.pA4).toFixed(2)} LEI</p>
                        </div>
                    </div>

                    ${data.note ? `<div class="notes"><b>Notă client:</b> ${data.note}</div>` : ''}

                    <div class="actions">
                        <a href="https://console.firebase.google.com/project/${firebaseConfig.projectId}/storage/${firebaseConfig.storageBucket}/files/comenzi/${id}" 
                           target="_blank" class="btn btn-view">
                           <i class="fa-solid fa-folder-open"></i> DESCHIDE POZELE
                        </a>
                        
                        <button class="btn btn-accept" ${!isPrimit || isInAsteptare ? 'disabled' : ''} onclick="updateStatus('${id}', 'acceptată')">
                            <i class="fa-solid fa-check"></i> ACCEPTĂ
                        </button>

                        <button class="btn" style="background:var(--accent); color:white;" ${!isAcceptat || isInAsteptare ? 'disabled' : ''} onclick="updateStatus('${id}', 'în lucru')">
                            <i class="fa-solid fa-gears"></i> ÎN LUCRU
                        </button>

                        <button class="btn btn-done" ${!isInLucru || isInAsteptare ? 'disabled' : ''} onclick="updateStatus('${id}', 'finalizată')">
                            <i class="fa-solid fa-print"></i> GATA
                        </button>

                        <button class="btn" style="background:var(--warning); color:white;" ${isInAsteptare && currentTab === 'archive' ? 'disabled' : ''} onclick="updateStatus('${id}', '${isInAsteptare ? 'reia' : 'în așteptare'}')">
                            <i class="fa-solid fa-${isInAsteptare ? 'play' : 'pause'}"></i> ${isInAsteptare ? 'REIA COMANDA' : 'PUNE ÎN AȘTEPTARE'}
                        </button>

                        <button class="btn btn-delete" onclick="deleteOrder('${id}')">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function renderSettingsUI() {
            const listContainer = document.getElementById('orders-list');
            listContainer.innerHTML = `
                <div class="settings-container">
                    <h3 style="margin-bottom:20px;"><i class="fa-solid fa-coins"></i> Modifică Prețuri Site</h3>
                    <p style="font-size:14px; margin-bottom:25px; color:#666;">Modificările salvate aici vor apărea instantaneu pe pagina clienților.</p>
                    <div style="display:flex; flex-direction:column; gap:20px;">
                        ${['10', '13', 'A4'].map(f => `
                            <div style="padding:15px; background:#f9fbfe; border-radius:12px; border:1px solid #eef2f6;">
                                <b style="display:block; margin-bottom:10px;">Format ${f === 'A4' ? 'A4' : f + 'x' + (f==='10'?'15':'18')} cm</b>
                                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                                    <div>
                                        <small style="display:block; color:#8898aa;">Preț Nou</small>
                                        <input type="number" step="0.01" id="set-p${f}" value="${currentPrices['p'+f]}" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ccc;">
                                    </div>
                                    <div>
                                        <small style="display:block; color:#8898aa;">Preț Vechi (tăiat)</small>
                                        <input type="number" step="0.01" id="set-old-p${f}" value="${currentPrices['old_p'+f] || ''}" style="width:100%; padding:8px; border-radius:8px; border:1px solid #ccc;">
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                        
                        <div style="padding:15px; background:#fff5f5; border-radius:12px; border:1px solid #ffebeb;">
                            <b style="display:block; margin-bottom:10px;"><i class="fa-solid fa-calendar-day"></i> Valabilitate Promoție</b>
                            <input type="text" id="set-promo-date" value="${currentPrices.promoDate || ''}" placeholder="Ex: 15 Aprilie" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;">
                            <small style="display:block; margin-top:5px; color:#e53935;">Lăsați gol dacă nu doriți să afișați data.</small>
                        </div>

                        <button id="save-prices-btn" class="btn btn-done" style="width:100%; justify-content:center; padding:15px; margin-top:10px;" onclick="savePrices()">
                            <i class="fa-solid fa-floppy-disk"></i> SALVEAZĂ NOILE PREȚURI
                        </button>
                    </div>
                </div>`;
        }

        function renderReportsUI(count10, count13, countA4) {
            const listContainer = document.getElementById('orders-list');
            const totalRevenue = (count10 * currentPrices.p10 + count13 * currentPrices.p13 + countA4 * currentPrices.pA4).toFixed(2);
            listContainer.innerHTML = `
                <div class="reports-grid">
                    <div class="report-card">
                        <i class="fa-solid fa-sack-dollar"></i>
                        <small>VENIT ESTIMAT TOTAL</small>
                        <h3>${totalRevenue} LEI</h3>
                    </div>
                    <div class="report-card">
                        <i class="fa-solid fa-images"></i>
                        <small>TOTAL POZE 10x15</small>
                        <h3>${count10} buc.</h3>
                    </div>
                    <div class="report-card">
                        <i class="fa-solid fa-image"></i>
                        <small>TOTAL POZE 13x18</small>
                        <h3>${count13} buc.</h3>
                    </div>
                    <div class="report-card">
                        <i class="fa-solid fa-file-image"></i>
                        <small>TOTAL FORMATE A4</small>
                        <h3>${countA4} buc.</h3>
                    </div>
                </div>`;
        }

        /**
         * FUNCȚIE ACTUALIZARE STATUS
         */
        function updateStatus(orderId, newStatus) {
            let confirmationMessage = "";
            let updateData = { status: newStatus };

            if (newStatus === 'acceptată') {
                confirmationMessage = "Sigur dorești să accepți această comandă?";
            } else if (newStatus === 'în lucru') {
                confirmationMessage = "Sigur dorești să treci comanda în stadiul de lucru?";
            } else if (newStatus === 'finalizată') {
                confirmationMessage = "Sigur dorești să marchezi această comandă ca fiind finalizată?";
            } else if (newStatus === 'în așteptare') {
                const reason = prompt("De ce pui comanda în așteptare? (Ex: Lipsă hârtie, Ocupat, etc.)");
                if (!reason) return; // Anulează dacă nu se introduce un motiv
                confirmationMessage = "Sigur dorești să pui comanda în așteptare?";
                updateData.onHoldReason = reason;
            } else if (newStatus === 'reia') { // Când se reia o comandă din așteptare
                confirmationMessage = "Sigur dorești să reiei această comandă?";
                updateData.status = 'acceptată'; // Se reia la statusul de acceptată
                updateData.onHoldReason = firebase.firestore.FieldValue.delete(); // Șterge motivul
            } else {
                confirmationMessage = "Sigur dorești să schimbi statusul acestei comenzi?";
            }

            if (confirm(confirmationMessage)) {
                db.collection("comenzi").doc(orderId).update(updateData).then(() => {
                    console.log("Status actualizat!");
                }).catch((error) => {
                    alert("Eroare la actualizare: " + error.message);
                });
            }
        }

        /**
         * SALVARE PREȚURI ÎN FIREBASE
         */
        function savePrices() {
            const btn = document.getElementById('save-prices-btn');
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> SE SALVEAZĂ...';

            const data = {
                p10: parseFloat(document.getElementById('set-p10').value) || 0,
                old_p10: parseFloat(document.getElementById('set-old-p10').value) || 0,
                p13: parseFloat(document.getElementById('set-p13').value) || 0,
                old_p13: parseFloat(document.getElementById('set-old-p13').value) || 0,
                pA4: parseFloat(document.getElementById('set-pA4').value) || 0,
                old_pA4: parseFloat(document.getElementById('set-old-pA4').value) || 0,
                promoDate: document.getElementById('set-promo-date').value
            };

            db.collection("settings").doc("prices").set(data).then(() => {
                btn.style.background = "#2ed573";
                btn.innerHTML = '<i class="fa-solid fa-check"></i> PREȚURI ACTUALIZATE!';
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.style.background = "";
                    btn.innerHTML = originalHtml;
                }, 3000);
            }).catch(err => {
                alert("Eroare la salvare: " + err.message);
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            });
        }

        /**
         * FUNCȚIE ȘTERGERE COMANDĂ
         */
        function deleteOrder(orderId) {
            if (confirm("Sigur dorești să ștergi această comandă din baza de date? (Pozele din Storage trebuie șterse manual din consola Firebase)")) {
                db.collection("comenzi").doc(orderId).delete().then(() => {
                    alert("Comanda a fost ștearsă din Firestore.");
                }).catch(err => {
                    alert("Eroare la ștergere: " + err.message + "\n\nAsigură-te că ai setat permisiunile 'allow delete: if true;' în Firebase Console -> Firestore -> Rules.");
                });
            }
        }

        /**
         * FUNCȚIE RESETARE ARHIVĂ (ȘTERGE TOT CE E FINALIZAT)
         */
        function clearArchive() {
            if (confirm("ATENȚIE! Dorești să ștergi TOATE comenzile din arhivă? Această acțiune va reseta sumele din raport la zero. Operațiunea este ireversibilă!")) {
                db.collection("comenzi").where("status", "==", "finalizată").get().then(snapshot => {
                    const batch = db.batch();
                    snapshot.forEach(doc => batch.delete(doc.ref));
                    return batch.commit();
                }).then(() => {
                    alert("Arhiva a fost ștearsă. Raportul a fost resetat!");
                }).catch(err => {
                    alert("Eroare la resetare: " + err.message);
                });
            }
        }
    </script>
</body>
